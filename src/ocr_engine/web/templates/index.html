<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCR PDF a texto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>OCR PDF a texto</h1>
        <p>Sube un PDF escaneado para generar texto y un PDF buscable.</p>

        {% if error %}
          <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('ocr') }}" method="post" enctype="multipart/form-data">
          <label>
            PDF
            <input type="file" name="document" accept="application/pdf,.pdf" required>
          </label>

          <label>
            Idiomas
            <input type="text" name="languages" value="spa+eng" autocomplete="off">
          </label>

          <label>
            Ruta de OCRmyPDF
            <input type="text" name="ocrmypdf_cmd" value="ocrmypdf" autocomplete="off">
          </label>

          <fieldset>
            <legend>Mejoras OCR</legend>
            <label class="check"><input type="checkbox" name="rotate_pages" checked> Corregir rotacion</label>
            <label class="check"><input type="checkbox" name="deskew" checked> Enderezar paginas</label>
            <label class="check"><input type="checkbox" name="clean"> Limpiar ruido de imagen con unpaper</label>
          </fieldset>

          <fieldset>
            <legend>Modo</legend>
            <label class="check"><input type="radio" name="ocr_mode" value="skip" checked> Respetar texto existente</label>
            <label class="check"><input type="radio" name="ocr_mode" value="redo"> Rehacer OCR existente</label>
            <label class="check"><input type="radio" name="ocr_mode" value="force"> Forzar OCR completo</label>
          </fieldset>

          <button type="submit">Procesar PDF</button>
          <small>Limite actual: {{ max_upload_mb }} MB.</small>
        </form>
      </section>
    </main>
  </body>
</html>
